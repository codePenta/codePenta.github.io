<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <title>Portfolio</title>
</head>

<body>
    <header>
        <div class="mobile-menu">
            <div class="hamburger">
                <div class="hamburger-menu-line"></div>
                <div class="hamburger-menu-line"></div>
                <div class="hamburger-menu-line"></div>
            </div>

            <div class="menu-items">
                    <div class="close-hamburger">
                        <div class="close-mobile-menu"></div>
                        <div class="close-mobile-menu"></div>
                        <div class="close-mobile-menu"></div>
                    </div>
                <ul>
                    <a href="#intro-wrapper">
                        <li>Home</li>
                    </a>
                    <a href="#projects-wrapper">
                        <li>Projects</li>
                    </a>
                    <a href="#contact-wrapper">
                        <li>Contact</li>
                    </a>
                </ul>
            </div>
        </div>

        <nav>
            <ul>
                <a href="#intro-wrapper">
                    <div class="prefix"></div>
                    <li>Home</li>
                </a>
                <a href="#projects-wrapper">
                    <div class="prefix"></div>
                    <li>Projects</li>
                </a>
                <a href="#contact-wrapper">
                    <div class="prefix"></div>
                    <li>Contact</li>
                </a>
            </ul>
        </nav>
    </header>

    <main>
        <div id="intro-wrapper">
            <section class="intro-container">
                <h1>Ferenz Helm</h1>
                <p class="subtitle"><span id="age"></span> years old, doing what I love</p>
            </section>
        </div>
        <div id="projects-wrapper">
            <section class="projects-container lighter">
                <h1>Projects</h1>
                <h5>Currently working on</h5>
                <div class="current-project">
                    <div class="current-project-header">
                        <h4 id="project-name"></h4>
                    </div>
                    <div class="current-project-body">
                        <p class="current-project-description"></p>
                    </div>
                </div>
            </section>
        </div>
        <div id="contact-wrapper">
            <section class="contact-container">
                <h1>Contact</h1>
                <h5>Found my work intriguing?</h5>
            </section>
        </div>
    </main>
</body>
<script src="scripts/main.js" type="module"></script>

</html>
